[build]
  command = "npm run build"
  publish = "dist"
  # [SMART DEPLOY] Solo dispara el build si hay cambios en código fuente o activos.
  # Ignora cambios en docs, metadatos y archivos de sistema.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- src/ public/ package.json package-lock.json astro.config.mjs netlify.toml"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
