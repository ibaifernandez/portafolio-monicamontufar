[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# [SISTEMA DE DEPLOY INTELIGENTE]
# Solo realiza el build si hay cambios en el código fuente o activos críticos.
# Ignora cambios en documentación, logs y archivos de sistema.
[build]
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . -- ':!docs' ':!.gemini' ':!task.md' ':!walkthrough.md' ':!ROADMAP.md' ':!CHANGELOG.md' ':!BACKLOG.md'"

