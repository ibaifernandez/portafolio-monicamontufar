[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Bloqueo de deploys automáticos para ahorrar minutos
# El comando "exit 0" le dice a Netlify que no hay cambios que desplegar,
# deteniendo el build antes de gastar minutos innecesarios.
# Puedes quitar esto o comentarlo cuando quieras despegar una rama específica.
# [build]
#   ignore = "exit 0"
