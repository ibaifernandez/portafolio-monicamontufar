[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# [SISTEMA DE DEPLOY INTELIGENTE]
# Solo realiza el build si el mensaje de commit incluye el flag "[deploy]"
# Ejemplo: git commit -m "feat: New feature [deploy]"
[build]
  ignore = "git log -1 --pretty=%B | grep -qv '\\[deploy\\]'"
